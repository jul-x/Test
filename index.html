<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>English Communication Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="deck" id="deckA" onclick="drawCard('A')">
            <h2>A</h2>
            <p>Tap</p>
            <div class="result" id="resA"></div>
        </div>
        <div class="deck" id="deckB" onclick="drawCard('B')">
            <h2>B</h2>
            <p>Tap</p>
            <div class="result" id="resB"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
